version: "3.8"

services:
  server:
    build: .
    command: uv run uvicorn harvester.api.app:create_app --factory --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    command: uv run python -m harvester.cli.main
    env_file:
      - path: .env
        required: false
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f harvester.cli || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
