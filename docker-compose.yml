version: "3.8"

services:
  server:
    build: .
    command: uv run uvicorn harvester.api.app:create_app --factory --host 0.0.0.0 --port 8001
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    command: uv run harvester worker run
    env_file:
      - path: .env
        required: false
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f '[h]arvester worker run' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  scheduler:
    build: .
    command: uv run harvester scheduler daemon
    env_file:
      - path: .env
        required: false
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f '[h]arvester scheduler daemon' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  crawl-worker:
    build: .
    command: uv run harvester worker run --job-type crawl
    env_file:
      - path: .env
        required: false
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f '[h]arvester worker run --job-type crawl' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
